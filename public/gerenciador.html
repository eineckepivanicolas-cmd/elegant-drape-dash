<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerenciador Cortinas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f5f8fc;
    --surface: #ffffff;
    --surface-2: #eef3fa;
    --text: #0a1628;
    --muted: #5a6a85;
    --border: #d6dee9;
    --primary: #0b2a5b;
    --primary-2: #1e40af;
    --primary-dark: #061a3d;
    --primary-soft: #e3ebf7;
    --success: #047857;
    --success-soft: #d1fae5;
    --danger: #b91c1c;
    --danger-soft: #fee2e2;
    --info: #1e40af;
    --info-soft: #dbeafe;
    --warning: #b45309;
    --warning-soft: #fef3c7;
    --shadow-sm: 0 1px 3px rgba(11,42,91,.08);
    --shadow-md: 0 6px 20px rgba(11,42,91,.10);
    --shadow-lg: 0 16px 40px rgba(11,42,91,.18);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* HEADER */
  header.app-header {
    background: linear-gradient(135deg, #061a3d 0%, #0b2a5b 50%, #1e40af 100%);
    color: #fff;
    padding: 28px 24px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand .logo {
    width: 52px; height: 52px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .brand h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
  .brand p { opacity: .85; font-size: .88rem; margin-top: 2px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat-pill {
    background: rgba(255,255,255,.13);
    border: 1px solid rgba(255,255,255,.2);
    padding: 10px 18px;
    border-radius: 14px;
    display: flex; flex-direction: column; align-items: flex-start;
    line-height: 1.2;
  }
  .stat-pill .lbl { font-size: .7rem; opacity: .8; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .stat-pill .val { font-size: 1.1rem; font-weight: 800; margin-top: 2px; }

  /* SECTION CARD */
  .section {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow-md);
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .section-title {
    display: flex; align-items: center; gap: 12px;
    font-size: 1.2rem; font-weight: 700; margin-bottom: 22px;
  }
  .section-title i {
    width: 36px; height: 36px;
    background: var(--primary-soft); color: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  .section-title .count {
    margin-left: auto;
    background: var(--primary-soft); color: var(--primary-dark);
    padding: 4px 12px; border-radius: 999px;
    font-size: .8rem; font-weight: 700;
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: .82rem; font-weight: 600; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  label .opt { color: var(--muted); font-weight: 400; font-size: .72rem; opacity: .75; }
  input, select, textarea {
    font-family: inherit;
    font-size: .95rem;
    color: var(--text);
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    transition: all .2s ease;
    width: 100%;
  }
  input:hover, select:hover, textarea:hover { border-color: #b6c2d4; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(11,42,91,.12);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* AMBIENTES */
  .ambientes-wrap { margin-top: 24px; display: grid; gap: 16px; }
  .ambientes-wrap .ambientes-title {
    font-weight: 700; display: flex; align-items: center; gap: 10px;
    color: var(--text); font-size: 1rem;
  }
  .ambientes-title i { color: var(--primary); }
  .ambientes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
  }
  .ambiente-card {
    background: linear-gradient(135deg, #f5f8fc, #e3ebf7);
    border: 1.5px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: var(--radius);
    padding: 18px;
    animation: slideIn .35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: none; }
  }
  .ambiente-head {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; color: var(--primary-dark);
    margin-bottom: 12px; font-size: .95rem;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .ambiente-head .num {
    background: var(--primary); color: #fff;
    width: 26px; height: 26px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem;
  }
  .ambiente-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
  }

  /* BUTTONS */
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: none; cursor: pointer; font-family: inherit;
    font-size: .92rem; font-weight: 600;
    padding: 11px 20px;
    border-radius: var(--radius-sm);
    display: inline-flex; align-items: center; gap: 8px;
    transition: all .2s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    color: #fff;
    box-shadow: 0 4px 12px rgba(11,42,91,.25);
  }
  .btn-primary:hover { box-shadow: 0 8px 20px rgba(11,42,91,.35); transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface-2); color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { background: #fff; border-color: #b6c2d4; }
  .btn-edit { background: var(--info-soft); color: var(--info); }
  .btn-edit:hover { background: var(--info); color: #fff; }
  .btn-delete { background: var(--danger-soft); color: var(--danger); }
  .btn-delete:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: .85rem; }

  /* CARDS DE PEDIDOS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .pedido-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    box-shadow: var(--shadow-md);
    transition: all .25s ease;
    display: flex; flex-direction: column;
    animation: slideIn .35s ease;
  }
  .pedido-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-3px);
    border-color: rgba(11,42,91,.25);
  }
  .pedido-head {
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .pedido-cliente {
    font-size: 1.12rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .pedido-cliente i { color: var(--primary); }
  .pedido-numero {
    background: var(--primary-soft); color: var(--primary-dark);
    padding: 4px 10px; border-radius: 999px;
    font-size: .72rem; font-weight: 700;
  }
  .pedido-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .meta-item {
    background: var(--surface-2);
    border-radius: 10px;
    padding: 8px 12px;
  }
  .meta-item .lbl {
    font-size: .68rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
    display: flex; align-items: center; gap: 4px;
  }
  .meta-item .v { font-size: .92rem; font-weight: 700; margin-top: 2px; }
  .meta-item .v.valor { color: var(--success); }

  .ambs-list {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 14px;
  }
  .amb-row {
    background: var(--surface-2);
    border-left: 3px solid var(--primary);
    border-radius: 10px;
    padding: 10px 12px;
  }
  .amb-row .amb-nome {
    font-weight: 700; font-size: .92rem; display: flex; align-items: center; gap: 6px;
  }
  .amb-row .amb-medidas {
    font-size: .82rem; color: var(--muted);
    margin-top: 2px;
  }
  .amb-row .amb-tags {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-top: 8px;
  }

  .badge {
    font-size: .72rem; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .badge-tipo { background: var(--info-soft); color: var(--info); }
  .badge-auto { background: #ede9fe; color: #6d28d9; }
  .badge-manual { background: var(--warning-soft); color: var(--warning); }

  .pedido-obs {
    background: var(--warning-soft);
    color: #78350f;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: .85rem;
    margin-bottom: 14px;
    border-left: 3px solid var(--warning);
  }
  .pedido-actions {
    display: flex; gap: 8px; margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .pedido-actions .btn { flex: 1; justify-content: center; }

  /* EMPTY STATE */
  .empty {
    text-align: center; padding: 50px 20px;
    color: var(--muted);
  }
  .empty i { font-size: 3rem; opacity: .35; margin-bottom: 12px; }
  .empty p { font-size: .95rem; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    box-shadow: var(--shadow-lg);
    padding: 14px 18px;
    border-radius: var(--radius);
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: .9rem;
    transform: translateX(120%); transition: transform .3s ease;
    z-index: 9999; max-width: 360px;
  }
  .toast.show { transform: translateX(0); }
  .toast.success { border-left-color: var(--success); }
  .toast.success i { color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  .toast.error i { color: var(--danger); }

  @media (max-width: 600px) {
    .container { padding: 14px; }
    .section { padding: 18px; }
    header.app-header { padding: 22px 18px; }
    .brand h1 { font-size: 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header class="app-header">
    <div class="brand">
      <div class="logo"><i class="fa-solid fa-store"></i></div>
      <div>
        <h1>Gerenciador Cortinas</h1>
        <p>Sistema profissional de pedidos</p>
      </div>
    </div>
    <div class="stats">
      <div class="stat-pill">
        <span class="lbl"><i class="fa-solid fa-clipboard-list"></i> Pedidos</span>
        <span class="val" id="stat-pedidos">0</span>
      </div>
      <div class="stat-pill">
        <span class="lbl"><i class="fa-solid fa-coins"></i> Total</span>
        <span class="val" id="stat-total">R$ 0,00</span>
      </div>
    </div>
  </header>

  <section class="section">
    <h2 class="section-title">
      <i class="fa-solid fa-pen-to-square"></i>
      <span id="form-title">Novo Pedido</span>
    </h2>
    <form id="pedido-form" autocomplete="off">
      <input type="hidden" id="pedido-id" />
      <div class="form-grid">
        <div class="field">
          <label><i class="fa-solid fa-user"></i> Nome do cliente</label>
          <input type="text" id="cliente" required placeholder="Ex: Maria Silva" />
        </div>
        <div class="field">
          <label><i class="fa-solid fa-hashtag"></i> Número do pedido <span class="opt">(opcional)</span></label>
          <input type="text" id="numeroPedido" placeholder="Ex: #1042" />
        </div>
        <div class="field">
          <label><i class="fa-solid fa-calendar"></i> Data</label>
          <input type="date" id="data" required />
        </div>
        <div class="field">
          <label><i class="fa-solid fa-dollar-sign"></i> Valor <span class="opt">(opcional)</span></label>
          <input type="number" id="valor" step="0.01" min="0" placeholder="R$ 0,00" />
        </div>
        <div class="field full">
          <label><i class="fa-solid fa-location-dot"></i> Endereço</label>
          <input type="text" id="endereco" required placeholder="Rua, número, bairro, cidade" />
        </div>
        <div class="field">
          <label><i class="fa-solid fa-layer-group"></i> Quantidade de ambientes</label>
          <input type="number" id="qtdAmbientes" min="1" max="20" value="1" required />
        </div>
        <div class="field full">
          <label><i class="fa-solid fa-comment"></i> Observações <span class="opt">(opcional)</span></label>
          <textarea id="observacoes" placeholder="Informações adicionais sobre o pedido..."></textarea>
        </div>
      </div>

      <div class="ambientes-wrap">
        <div class="ambientes-title"><i class="fa-solid fa-house"></i> Ambientes</div>
        <div class="ambientes-grid" id="ambientes-container"></div>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-floppy-disk"></i> <span id="submit-text">Salvar Pedido</span>
        </button>
        <button type="button" class="btn btn-ghost" id="btn-cancel" style="display:none">
          <i class="fa-solid fa-xmark"></i> Cancelar
        </button>
        <button type="reset" class="btn btn-ghost">
          <i class="fa-solid fa-rotate"></i> Limpar
        </button>
      </div>
    </form>
  </section>

  <section class="section">
    <h2 class="section-title">
      <i class="fa-solid fa-clipboard-list"></i>
      Pedidos cadastrados
      <span class="count" id="count-pedidos">0</span>
    </h2>
    <div id="cards-area"></div>
  </section>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-circle-check"></i><span id="toast-msg"></span></div>

<script>
class App {
  constructor() {
    this.tipos = ['Trilho Suíço', 'Caixa Box', 'Persiana', 'Ilhós', 'Tubo Deslizante'];
    this.controles = ['Manual', 'Automatizada'];
    this.pedidos = JSON.parse(localStorage.getItem('cortinas:pedidos') || '[]');
    this.editingId = null;
  }

  init() {
    document.getElementById('data').valueAsDate = new Date();
    this.renderAmbientes();
    this.renderCards();
    this.bindEvents();
  }

  bindEvents() {
    document.getElementById('qtdAmbientes').addEventListener('input', () => this.renderAmbientes());
    document.getElementById('pedido-form').addEventListener('submit', e => {
      e.preventDefault();
      this.salvarPedido();
    });
    document.getElementById('pedido-form').addEventListener('reset', () => {
      setTimeout(() => {
        document.getElementById('data').valueAsDate = new Date();
        document.getElementById('qtdAmbientes').value = 1;
        this.renderAmbientes();
      }, 0);
    });
    document.getElementById('btn-cancel').addEventListener('click', () => this.cancelarEdicao());
  }

  renderAmbientes(dados = null) {
    const qtd = Math.max(1, Math.min(20, parseInt(document.getElementById('qtdAmbientes').value) || 1));
    const container = document.getElementById('ambientes-container');
    container.innerHTML = '';
    for (let i = 0; i < qtd; i++) {
      const d = dados && dados[i] ? dados[i] : { nome: '', largura: '', altura: '', tipoCortina: this.tipos[0], controle: 'Manual' };
      const card = document.createElement('div');
      card.className = 'ambiente-card';
      card.innerHTML = `
        <div class="ambiente-head"><span class="num">${i + 1}</span> Ambiente ${i + 1}</div>
        <div class="ambiente-grid">
          <div class="field" style="grid-column:1/-1">
            <label>Nome</label>
            <input type="text" data-amb="nome" data-i="${i}" value="${this.esc(d.nome)}" placeholder="Ex: Sala" />
          </div>
          <div class="field">
            <label>Largura (m)</label>
            <input type="number" step="0.01" min="0" data-amb="largura" data-i="${i}" value="${this.esc(d.largura)}" placeholder="2.50" required />
          </div>
          <div class="field">
            <label>Altura (m)</label>
            <input type="number" step="0.01" min="0" data-amb="altura" data-i="${i}" value="${this.esc(d.altura)}" placeholder="2.20" required />
          </div>
          <div class="field" style="grid-column:1/-1">
            <label>Tipo de cortina</label>
            <select data-amb="tipoCortina" data-i="${i}">
              ${this.tipos.map(t => `<option ${t === d.tipoCortina ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="field" style="grid-column:1/-1">
            <label>Controle</label>
            <select data-amb="controle" data-i="${i}">
              ${this.controles.map(c => `<option ${c === d.controle ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
        </div>
      `;
      container.appendChild(card);
    }
  }

  coletarAmbientes() {
    const qtd = parseInt(document.getElementById('qtdAmbientes').value) || 1;
    const ambs = [];
    for (let i = 0; i < qtd; i++) {
      const get = (k) => document.querySelector(`[data-amb="${k}"][data-i="${i}"]`).value;
      ambs.push({
        nome: get('nome') || `Ambiente ${i + 1}`,
        largura: get('largura'),
        altura: get('altura'),
        tipoCortina: get('tipoCortina'),
        controle: get('controle'),
      });
    }
    return ambs;
  }

  salvarPedido() {
    const pedido = {
      id: this.editingId || Date.now().toString(),
      cliente: document.getElementById('cliente').value.trim(),
      endereco: document.getElementById('endereco').value.trim(),
      numeroPedido: document.getElementById('numeroPedido').value.trim(),
      data: document.getElementById('data').value,
      valor: document.getElementById('valor').value,
      observacoes: document.getElementById('observacoes').value.trim(),
      ambientes: this.coletarAmbientes(),
    };

    if (this.editingId) {
      this.pedidos = this.pedidos.map(p => p.id === this.editingId ? pedido : p);
      this.toast('Pedido atualizado com sucesso!', 'success');
    } else {
      this.pedidos.unshift(pedido);
      this.toast('Pedido salvo com sucesso!', 'success');
    }
    this.editingId = null;
    this.persist();
    this.renderCards();
    document.getElementById('pedido-form').reset();
    document.getElementById('form-title').textContent = 'Novo Pedido';
    document.getElementById('submit-text').textContent = 'Salvar Pedido';
    document.getElementById('btn-cancel').style.display = 'none';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  editar(id) {
    const p = this.pedidos.find(x => x.id === id);
    if (!p) return;
    this.editingId = id;
    document.getElementById('cliente').value = p.cliente || '';
    document.getElementById('endereco').value = p.endereco || '';
    document.getElementById('numeroPedido').value = p.numeroPedido || '';
    document.getElementById('data').value = p.data || '';
    document.getElementById('valor').value = p.valor || '';
    document.getElementById('observacoes').value = p.observacoes || '';
    document.getElementById('qtdAmbientes').value = p.ambientes.length;
    this.renderAmbientes(p.ambientes);
    document.getElementById('form-title').textContent = 'Editando Pedido';
    document.getElementById('submit-text').textContent = 'Atualizar Pedido';
    document.getElementById('btn-cancel').style.display = 'inline-flex';
    // remove temporariamente até salvar
    this.pedidos = this.pedidos.filter(x => x.id !== id);
    this.persist();
    this.renderCards();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  cancelarEdicao() {
    this.editingId = null;
    document.getElementById('pedido-form').reset();
    document.getElementById('form-title').textContent = 'Novo Pedido';
    document.getElementById('submit-text').textContent = 'Salvar Pedido';
    document.getElementById('btn-cancel').style.display = 'none';
  }

  excluir(id) {
    const p = this.pedidos.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Excluir o pedido de ${p.cliente}?\nEsta ação não pode ser desfeita.`)) return;
    this.pedidos = this.pedidos.filter(x => x.id !== id);
    this.persist();
    this.renderCards();
    this.toast('Pedido excluído.', 'error');
  }

  renderCards() {
    const area = document.getElementById('cards-area');
    document.getElementById('count-pedidos').textContent = this.pedidos.length;
    document.getElementById('stat-pedidos').textContent = this.pedidos.length;
    const total = this.pedidos.reduce((s, p) => s + (parseFloat(p.valor) || 0), 0);
    document.getElementById('stat-total').textContent = this.fmtMoney(total);

    if (!this.pedidos.length) {
      area.innerHTML = `
        <div class="empty">
          <i class="fa-solid fa-inbox"></i>
          <p>Nenhum pedido cadastrado ainda.<br>Preencha o formulário acima para começar.</p>
        </div>`;
      return;
    }

    area.innerHTML = `<div class="cards-grid">${this.pedidos.map(p => this.cardHTML(p)).join('')}</div>`;
    area.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => this.editar(b.dataset.edit)));
    area.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => this.excluir(b.dataset.del)));
  }

  cardHTML(p) {
    const valor = p.valor ? this.fmtMoney(parseFloat(p.valor)) : null;
    const data = p.data ? new Date(p.data + 'T00:00:00').toLocaleDateString('pt-BR') : '-';
    return `
      <article class="pedido-card">
        <div class="pedido-head">
          <div class="pedido-cliente"><i class="fa-solid fa-user"></i> ${this.esc(p.cliente)}</div>
          ${p.numeroPedido ? `<span class="pedido-numero">#${this.esc(p.numeroPedido)}</span>` : ''}
        </div>
        <div class="pedido-meta">
          <div class="meta-item">
            <div class="lbl"><i class="fa-solid fa-calendar"></i> Data</div>
            <div class="v">${data}</div>
          </div>
          ${valor ? `<div class="meta-item"><div class="lbl"><i class="fa-solid fa-dollar-sign"></i> Valor</div><div class="v valor">${valor}</div></div>` : ''}
          <div class="meta-item">
            <div class="lbl"><i class="fa-solid fa-location-dot"></i> Endereço</div>
            <div class="v" style="font-size:.82rem;font-weight:600">${this.esc(p.endereco)}</div>
          </div>
        </div>
        <div class="ambs-list">
          ${p.ambientes.map((a, i) => `
            <div class="amb-row">
              <div class="amb-nome"><i class="fa-solid fa-house"></i> ${this.esc(a.nome) || `Ambiente ${i + 1}`}</div>
              <div class="amb-medidas"><i class="fa-solid fa-ruler-combined"></i> ${this.esc(a.largura)}m × ${this.esc(a.altura)}m</div>
              <div class="amb-tags">
                <span class="badge badge-tipo"><i class="fa-solid fa-layer-group"></i> ${this.esc(a.tipoCortina)}</span>
                <span class="badge ${a.controle === 'Automatizada' ? 'badge-auto' : 'badge-manual'}">
                  <i class="fa-solid ${a.controle === 'Automatizada' ? 'fa-bolt' : 'fa-hand-pointer'}"></i> ${this.esc(a.controle)}
                </span>
              </div>
            </div>
          `).join('')}
        </div>
        ${p.observacoes ? `<div class="pedido-obs"><i class="fa-solid fa-circle-info"></i> ${this.esc(p.observacoes)}</div>` : ''}
        <div class="pedido-actions">
          <button class="btn btn-edit btn-sm" data-edit="${p.id}"><i class="fa-solid fa-pen"></i> Editar</button>
          <button class="btn btn-delete btn-sm" data-del="${p.id}"><i class="fa-solid fa-trash"></i> Excluir</button>
        </div>
      </article>`;
  }

  persist() {
    localStorage.setItem('cortinas:pedidos', JSON.stringify(this.pedidos));
  }

  fmtMoney(v) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
  }

  esc(v) {
    return String(v ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  toast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.className = 'toast show ' + type;
    t.querySelector('i').className = 'fa-solid ' + (type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check');
    document.getElementById('toast-msg').textContent = msg;
    clearTimeout(this._tt);
    this._tt = setTimeout(() => t.classList.remove('show'), 2800);
  }
}

const app = new App();
app.init();
</script>
</body>
</html>
